<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="Container">
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button type="submit" id="getWeather" onclick="getweatherdata()">Get Weather</button>
    </div>
    <form id="weatherForm">
            <h1 id="cityName"></h1>
            <p id="temperature"></p>
            <p id="description"></p>
            <p id="humidity"></p>
            <p id="windSpeed"></p>
            <p id="weatherEmoji"></p>
            <p id="errorMessage" style="color: red;"></p>
    </form>
   
    
    
    <script src="index.js"></script>
</body>
